<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS Animals Kit</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="https://fav.farm/👓" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <div class="keys">
      <div data-key="65" class="key">
        <kbd>A</kbd>
        <span class="sound">bear</span>
      </div>
      <div data-key="83" class="key">
        <kbd>S</kbd>
        <span class="sound">birds</span>
      </div>
      <div data-key="68" class="key">
        <kbd>D</kbd>
        <span class="sound">bigcat</span>
      </div>
      <div data-key="70" class="key">
        <kbd>F</kbd>
        <span class="sound">chicken</span>
      </div>
      <div data-key="71" class="key">
        <kbd>G</kbd>
        <span class="sound">cow</span>
      </div>
      <div data-key="72" class="key">
        <kbd>H</kbd>
        <span class="sound">dog</span>
      </div>
      <div data-key="74" class="key">
        <kbd>J</kbd>
        <span class="sound">dolphin</span>
      </div>
      <div data-key="75" class="key">
        <kbd>K</kbd>
        <span class="sound">duck</span>
      </div>
      <div data-key="76" class="key">
        <kbd>L</kbd>
        <span class="sound">frog</span>
      </div>
    </div>

    <audio data-key="65" src="sounds/bear.wav"></audio>
    <audio data-key="83" src="sounds/birds.wav"></audio>
    <audio data-key="68" src="sounds/bigcat.wav"></audio>
    <audio data-key="70" src="sounds/chicken.wav"></audio>
    <audio data-key="71" src="sounds/cow.wav"></audio>
    <audio data-key="72" src="sounds/dog.wav"></audio>
    <audio data-key="74" src="sounds/dolphin.wav"></audio>
    <audio data-key="75" src="sounds/duck.wav"></audio>
    <audio data-key="76" src="sounds/frog.wav"></audio>
  </body>
</html>
